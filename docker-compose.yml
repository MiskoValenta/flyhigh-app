services:
  db:
    image: postgres:18-alpine
    container_name: flyhigh_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: FlyHighDb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - flyhigh_network

  backend:
    build:
      context: ./flyhigh-cs
      dockerfile: Dockerfile
    container_name: flyhigh_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ConnectionStrings__PostgresConnection=Host=db;Port=5432;Database=FlyHighDb;Username=postgres;Password=${DB_PASSWORD}
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__Key=${JWT_SECRET}
      - EmailSettings__Password=${EMAIL_PASSWORD}
    depends_on:
      - db
    networks:
      - flyhigh_network

  frontend:
    build:
      context: ./fly_high_next
      dockerfile: Dockerfile
    container_name: flyhigh_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_BACKEND_URL=http://flyhigh_backend:5000
      - NODE_OPTIONS=--dns-result-order=ipv4first
    depends_on:
      - backend
    networks:
      - flyhigh_network

volumes:
  pgdata:


networks:
  flyhigh_network:
    driver: bridge
